name: Build static and push to deploy-static

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write       

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build (Next export via next.config.js)
        run: npm run build

      - name: Push to deploy-static
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy-static
          folder: out
          clean: true